services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://app:app@db:5432/app?sslmode=disable
    ports:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
